data_inputs: "CDC weekly flu hospital admissions (NHSN), EHR surveillance data (weekly flu test volumes, positive tests, inpatient hospitalizations)"

methods: "Parametric Asymmetric Quantile Regression with recursive trend-based forecasting"
methods_long: "A parametric asymmetric quantile regression model integrating real-time EHR surveillance data with historical CDC trends. Predictors include Prisma Health testing volumes, positive tests, hospitalizations, lagged CDC admissions, and seasonal indicators. Forecasts are generated recursively (nowcast to 3-week ahead). A post-hoc log-scale trend adjustment based on recent CDC dynamics is applied, with phase-aware classification (e.g., surge, peak, decline) and adaptive bounds learned from recent data, rather than fixed caps. Trend effects are dynamically damped across horizons using phase-specific schedules. Uncertainty increases with horizon and is further refined using phase-dependent asymmetric interval compression. Forecasts are constrained to be non-negative, and quantile monotonicity is enforced via isotonic regression. Model updated March 21, 2026: added phase-aware trend detection, adaptive bounds, and dynamic damping."
