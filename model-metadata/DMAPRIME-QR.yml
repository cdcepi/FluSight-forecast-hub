data_inputs: "CDC weekly flu hospital admissions (NHSN), EHR surveillance data (weekly flu test volumes, positive tests, inpatient hospitalizations)"

methods: "Parametric Asymmetric Quantile Regression with recursive trend-based forecasting"
methods_long: "A hybrid direct horizon-specific quantile regression and decline-aware analog forecasting model integrating real-time EHR surveillance data with historical CDC trends. Predictors include Prisma Health testing volumes, positive tests, hospitalizations, lagged CDC admissions, trend, acceleration, post-peak decline, and seasonal indicators. Forecasts are generated for horizons 0–3 weeks ahead. Median forecasts combine quantile regression predictions with weighted historical analog trajectories, with tuning of analog neighborhood size, bandwidth, and QR–analog blending through rolling validation. Phase-aware classification is used to identify surge, plateau, and post-peak decline states. Uncertainty is estimated from a blend of analog forecast errors and phase-conditioned QR residuals, with quantile monotonicity enforced via isotonic regression. Forecasts are constrained to be non-negative. Model updated May 27, 2026: added decline-aware analog correction, rolling-validation tuning, and software implementation/evaluation file generation."
