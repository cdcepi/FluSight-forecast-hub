data_inputs: "CDC weekly flu hospital admissions (NHSN), Prisma Health EHR surveillance data (weekly positive tests, weekly inpatient hospitalizations, total encounters)"
methods: "Hybrid Parallel CNN-LSTM with Multi-Head Temporal Attention"
methods_long: "A hybrid deep learning architecture designed for probabilistic 1-4 week ahead influenza forecasting in South Carolina. The model features a parallel Inception-style Convolutional Neural Network (CNN) with multi-scale kernels (sizes 3 and 5) to capture both short-term weekly jitter and longer-term monthly trends. These spatial-temporal features are processed by a Bidirectional Long Short-Term Memory (Bi-LSTM) network to model complex temporal dependencies. The architecture incorporates dual Multi-Head Temporal Attention mechanisms—specifically focusing on magnitude and phase alignment—to minimize temporal lag and accurately anticipate surges. To handle the right-skewed nature of influenza surges, the model employs log-transformed target variables and optimized probabilistic quantile decoding. Training is robustly regularized using Gaussian noise augmentation, AdamW optimization with weight decay, and a custom Phase-Alignment Loss that penalizes directional forecasting errors. Forecasts are generated for 23 quantiles to provide a complete probabilistic distribution across a 4-week horizon."
