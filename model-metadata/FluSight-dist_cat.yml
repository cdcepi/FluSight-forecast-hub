methods_long: "Simple baseline model that assigns a fixed probability distribution to each rate-trend category for every jurisdiction and horizon, with probabilities remaining constant across weeks. Specifically, the model assigns probabilities of 0.05 (large decrease), 0.20 (decrease), 0.50 (stable), 0.20 (increase), and 0.05 (large increase)."
